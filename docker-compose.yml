# Reference compose for running both services together (local prod test or a
# single-host deploy). On Coolify you can use this file directly, or create two
# resources from Dockerfile.api and Dockerfile.web.
#
# Values are read from .env at the repo root.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      API_PORT: 4000
      API_HOST: 0.0.0.0
    ports:
      - '4000:4000'
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_REQUIRE_AUTH: ${VITE_REQUIRE_AUTH:-false}
    ports:
      - '8080:80'
    depends_on:
      - api
    restart: unless-stopped
